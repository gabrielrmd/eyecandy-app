<svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <!--
    Advertising Unplugged - LinkedIn Profile Banner
    Dimensions: 1584x396px (LinkedIn standard)
    Usage: LinkedIn profile header

    Design approach:
    - Horizontal landscape format
    - Dark navy background for sophistication
    - Large, clear headline
    - Strategic use of accent colors
    - Logo prominently displayed
    - Calls to action visible
  -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

      .banner-bg { fill: #1a1f2e; }
      .banner-accent { fill: #e8384f; }
      .banner-accent-light { fill: #4db8c4; opacity: 0.12; }
      .banner-text-main { font-family: 'Poppins', sans-serif; font-size: 56px; font-weight: 700; fill: #f8f9fa; }
      .banner-text-sub { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 400; fill: #e9ecef; }
      .banner-text-label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; fill: #e8384f; letter-spacing: 1px; }
      .banner-logo { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 700; fill: #f8f9fa; }
    </style>
  </defs>

  <!-- Main background -->
  <rect width="1584" height="396" class="banner-bg"/>

  <!-- Left accent stripe -->
  <rect width="8" height="396" class="banner-accent"/>

  <!-- Decorative geometric circles (background) -->
  <circle cx="1450" cy="100" r="180" class="banner-accent-light"/>
  <circle cx="1550" cy="350" r="120" class="banner-accent-light"/>
  <circle cx="100" cy="200" r="150" class="banner-accent-light"/>

  <!-- Left section: Logo and branding -->
  <g id="left-section">
    <!-- Company initials as logo -->
    <text x="50" y="80" class="banner-logo">AU</text>

    <!-- Divider line -->
    <line x1="50" y1="105" x2="200" y2="105" stroke="#e8384f" stroke-width="3" stroke-linecap="round"/>

    <!-- Company name -->
    <text x="50" y="150" class="banner-text-main" font-size="40">
      <tspan x="50" dy="0">Advertising</tspan>
      <tspan x="50" dy="50">Unplugged</tspan>
    </text>
  </g>

  <!-- Center section: Main message -->
  <g id="center-section">
    <!-- Label -->
    <text x="620" y="85" class="banner-text-label">STRATEGIC MARKETING FOR GROWTH</text>

    <!-- Tagline -->
    <text x="620" y="170" class="banner-text-sub" font-size="22">
      <tspan x="620" dy="0">Clarity Over Noise.</tspan>
      <tspan x="620" dy="35">Purpose Beyond Profit.</tspan>
    </text>

    <!-- Supporting text -->
    <text x="620" y="280" class="banner-text-sub" font-size="16">
      AI-powered strategy. Battle-tested templates.
    </text>
    <text x="620" y="310" class="banner-text-sub" font-size="16">
      Community that gets you.
    </text>
  </g>

  <!-- Right section: Key benefits (compact) -->
  <g id="right-section">
    <!-- Benefit icons (simplified circles) -->
    <g id="benefit-1">
      <circle cx="1400" cy="70" r="20" class="banner-accent" opacity="0.2"/>
      <text x="1400" y="80" font-family="'Poppins', sans-serif" font-size="16" font-weight="700" fill="#e8384f" text-anchor="middle">🎯</text>
      <text x="1470" y="80" class="banner-text-sub" font-size="13">Strategy</text>
    </g>

    <g id="benefit-2">
      <circle cx="1400" cy="140" r="20" class="banner-accent" opacity="0.2"/>
      <text x="1400" y="150" font-family="'Poppins', sans-serif" font-size="16" font-weight="700" fill="#e8384f" text-anchor="middle">📈</text>
      <text x="1470" y="150" class="banner-text-sub" font-size="13">Growth</text>
    </g>

    <g id="benefit-3">
      <circle cx="1400" cy="210" r="20" class="banner-accent" opacity="0.2"/>
      <text x="1400" y="220" font-family="'Poppins', sans-serif" font-size="16" font-weight="700" fill="#e8384f" text-anchor="middle">🔓</text>
      <text x="1470" y="220" class="banner-text-sub" font-size="13">Authentic</text>
    </g>

    <g id="benefit-4">
      <circle cx="1400" cy="280" r="20" class="banner-accent" opacity="0.2"/>
      <text x="1400" y="290" font-family="'Poppins', sans-serif" font-size="16" font-weight="700" fill="#e8384f" text-anchor="middle">👥</text>
      <text x="1470" y="290" class="banner-text-sub" font-size="13">Community</text>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect y="388" width="1584" height="8" class="banner-accent"/>
</svg>
